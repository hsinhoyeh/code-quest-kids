<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative grid blocks (right side) -->
  <g opacity="0.18">
    <!-- Grid cells -->
    <rect x="720" y="100" width="80" height="80" rx="8" fill="#4ecdc4"/>
    <rect x="810" y="100" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="900" y="100" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="990" y="100" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="1080" y="100" width="80" height="80" rx="8" fill="#2d2d5e"/>

    <rect x="720" y="190" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="810" y="190" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="900" y="190" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="990" y="190" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="1080" y="190" width="80" height="80" rx="8" fill="#2d2d5e"/>

    <rect x="720" y="280" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="810" y="280" width="80" height="80" rx="8" fill="#4ecdc4"/>
    <rect x="900" y="280" width="80" height="80" rx="8" fill="#4ecdc4"/>
    <rect x="990" y="280" width="80" height="80" rx="8" fill="#4ecdc4"/>
    <rect x="1080" y="280" width="80" height="80" rx="8" fill="#2d2d5e"/>

    <rect x="720" y="370" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="810" y="370" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="900" y="370" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="990" y="370" width="80" height="80" rx="8" fill="#4ecdc4"/>
    <rect x="1080" y="370" width="80" height="80" rx="8" fill="#2d2d5e"/>

    <rect x="720" y="460" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="810" y="460" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="900" y="460" width="80" height="80" rx="8" fill="#2d2d5e"/>
    <rect x="990" y="460" width="80" height="80" rx="8" fill="#ff6b6b"/>
    <rect x="1080" y="460" width="80" height="80" rx="8" fill="#2d2d5e"/>
  </g>

  <!-- Robot emoji on grid -->
  <text x="752" y="157" font-size="56" text-anchor="middle" opacity="0.6">🤖</text>
  <text x="1032" y="427" font-size="56" text-anchor="middle" opacity="0.6">🚩</text>

  <!-- Block pills (left decorative) -->
  <g opacity="0.22">
    <rect x="60" y="480" width="160" height="44" rx="22" fill="#ff6b6b"/>
    <text x="140" y="509" font-size="18" fill="white" text-anchor="middle" font-family="monospace">⬆ forward</text>
    <rect x="60" y="535" width="140" height="44" rx="22" fill="#4ecdc4"/>
    <text x="130" y="564" font-size="18" fill="white" text-anchor="middle" font-family="monospace">↩ turn left</text>
    <rect x="210" y="535" width="150" height="44" rx="22" fill="#45b7d1"/>
    <text x="285" y="564" font-size="18" fill="white" text-anchor="middle" font-family="monospace">↪ turn right</text>
    <rect x="370" y="535" width="130" height="44" rx="22" fill="#f9ca24"/>
    <text x="435" y="564" font-size="18" fill="#333" text-anchor="middle" font-family="monospace">🔁 repeat</text>
  </g>

  <!-- Main content -->
  <!-- Logo -->
  <text x="100" y="185" font-size="90" filter="url(#glow)">🤖</text>

  <!-- Title -->
  <text x="210" y="168" font-size="72" font-weight="bold" fill="white"
        font-family="'Segoe UI', Arial, sans-serif" letter-spacing="-1">
    Code Quest Kids
  </text>

  <!-- Chinese subtitle -->
  <text x="212" y="215" font-size="28" fill="#4ecdc4"
        font-family="'Segoe UI', Arial, sans-serif">
    程式冒險小高手
  </text>

  <!-- Divider -->
  <rect x="100" y="240" width="560" height="3" rx="2" fill="#4ecdc4" opacity="0.5"/>

  <!-- Description -->
  <text x="100" y="295" font-size="26" fill="#c8d6e5"
        font-family="'Segoe UI', Arial, sans-serif">
    Visual block-programming game for kids age 6–10
  </text>
  <text x="100" y="330" font-size="26" fill="#c8d6e5"
        font-family="'Segoe UI', Arial, sans-serif">
    Bilingual EN / 繁中  ·  No install  ·  Free forever
  </text>

  <!-- Pack badges -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="22">
    <rect x="100" y="365" width="108" height="48" rx="24" fill="#ff6b6b" opacity="0.9"/>
    <text x="154" y="395" fill="white" text-anchor="middle">🤖 Maze</text>

    <rect x="220" y="365" width="136" height="48" rx="24" fill="#f9ca24" opacity="0.9"/>
    <text x="288" y="395" fill="#333" text-anchor="middle">🚌 Bus &amp; Lights</text>

    <rect x="368" y="365" width="110" height="48" rx="24" fill="#6c5ce7" opacity="0.9"/>
    <text x="423" y="395" fill="white" text-anchor="middle">🛠️ Build</text>

    <rect x="490" y="365" width="106" height="48" rx="24" fill="#00b894" opacity="0.9"/>
    <text x="543" y="395" fill="white" text-anchor="middle">🐋 Ocean</text>

    <rect x="608" y="365" width="116" height="48" rx="24" fill="#e17055" opacity="0.9"/>
    <text x="666" y="395" fill="white" text-anchor="middle">🚚 Cargo</text>
  </g>

  <!-- Stars -->
  <text x="100" y="468" font-size="40">⭐⭐⭐</text>
  <text x="232" y="468" font-size="26" fill="#c8d6e5"
        font-family="'Segoe UI', Arial, sans-serif">
    earn stars for clever solutions
  </text>

  <!-- URL footer -->
  <rect x="0" y="580" width="1200" height="50" fill="#000000" opacity="0.35"/>
  <text x="600" y="613" font-size="22" fill="#4ecdc4" text-anchor="middle"
        font-family="monospace">
    hsinhoyeh.github.io/code-quest-kids
  </text>
</svg>
